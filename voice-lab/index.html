<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowOS Voice Lab</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fa;
        --panel: #ffffff;
        --ink: #0f172a;
        --muted: #64748b;
        --line: #d8e1ea;
        --brand: #d97706;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #fff8ee 0%, var(--bg) 52%);
        color: var(--ink);
      }

      .wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 14px 30px rgba(15, 23, 42, 0.06);
      }

      h1 {
        margin: 0;
        font-size: 1.6rem;
      }

      p {
        margin: 8px 0 0;
        color: var(--muted);
      }

      .row {
        margin-top: 14px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        padding: 10px 14px;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
      }

      button:hover {
        border-color: #b7c4d2;
      }

      button.primary {
        background: var(--brand);
        color: #fff;
        border-color: var(--brand);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      textarea,
      pre {
        width: 100%;
        border-radius: 10px;
        border: 1px solid var(--line);
        padding: 10px;
        font-family: "SF Mono", Menlo, monospace;
        font-size: 0.9rem;
        background: #fbfdff;
      }

      textarea {
        min-height: 92px;
        resize: vertical;
      }

      pre {
        min-height: 120px;
        overflow-x: auto;
      }

      .label {
        margin-top: 16px;
        margin-bottom: 6px;
        font-size: 0.8rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .status {
        margin-top: 12px;
        color: #0b5f35;
        font-weight: 600;
      }

      #examples {
        margin-top: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .exampleBtn {
        font-size: 0.85rem;
        padding: 8px 10px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <h1>FlowOS Voice Lab</h1>
        <p>Standalone prototype: voice input -> parser -> command selection -> native execution.</p>

        <div class="row">
          <button id="recordBtn" class="primary" type="button">Start Listening</button>
          <button id="stopBtn" type="button" disabled>Stop</button>
          <button id="parseBtn" type="button">Parse Transcript</button>
        </div>

        <div class="status" id="status">Booting...</div>

        <div class="label">Transcript</div>
        <textarea id="transcript" placeholder="Say or paste transcript here..."></textarea>

        <div class="label">Selected Command String</div>
        <textarea id="commandString" readonly></textarea>

        <div class="label">Examples</div>
        <div id="examples"></div>

        <div class="label">Parse / Execute Result JSON</div>
        <pre id="resultJson">{}</pre>
      </div>
    </div>

    <script type="module" src="./app.mjs"></script>
  </body>
</html>
